<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-dark">

<div class="container">

<div class="login-box">

<h2>🎮 Gamer Inventory</h2>

<input type="text"
id="usuario"
class="form-control mb-3"
placeholder="Usuario">

<input type="password"
id="password"
class="form-control mb-3"
placeholder="Contraseña">

<button class="btn btn-primary w-100"
onclick="login()">
Ingresar
</button>

</div>

</div>

<script src="js/login.js"></script>

</body>
</html>
